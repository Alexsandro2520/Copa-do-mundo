<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa do Mundo Interativa</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

<header>
    <span class="header-trophy">🏆</span>
    <h1>Copa do Mundo Interativa</h1>
    <p>Monte seu torneio · Insira placares · Acompanhe a classificação</p>
</header>

<main>

  <!-- CRIAR JOGO -->
  <div class="card">
    <div class="card-header">
      <span class="icon">⚽</span>
      <h2>Adicionar Partida</h2>
    </div>
    <div class="card-body">
      <div class="match-form">
        <div class="form-group">
          <label>País A</label>
          <select id="selA"></select>
        </div>
        <div class="vs-badge">VS</div>
        <div class="form-group">
          <label>País B</label>
          <select id="selB"></select>
        </div>
        <button class="btn btn-primary" onclick="addMatch()">
          <span>＋</span> Adicionar Jogo
        </button>
      </div>
    </div>
  </div>

  <!-- LISTA DE JOGOS -->
  <div class="card">
    <div class="card-header">
      <span class="icon">📋</span>
      <h2>Partidas</h2>
    </div>
    <div class="card-body" style="padding:0">
      <div class="table-wrap">
        <table id="matchTable">
          <thead>
            <tr>
              <th>#</th>
              <th>País A</th>
              <th class="center">Placar A</th>
              <th class="center">—</th>
              <th class="center">Placar B</th>
              <th>País B</th>
              <th class="center">Resultado</th>
              <th class="center">Remover</th>
            </tr>
          </thead>
          <tbody id="matchBody">
            <tr><td colspan="8"><div class="empty-state"><span class="empty-icon">⚽</span>Nenhuma partida adicionada ainda.</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="section-actions">
      <button class="btn btn-gold" onclick="calcStandings()">
        📊 Calcular Classificação
      </button>
    </div>
  </div>

  <!-- CLASSIFICAÇÃO -->
  <div class="card" id="standingsCard" style="display:none">
    <div class="card-header">
      <span class="icon">📊</span>
      <h2>Classificação</h2>
    </div>
    <div class="card-body" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pos</th>
              <th>País</th>
              <th class="center">Pts</th>
              <th class="center">V</th>
              <th class="center">E</th>
              <th class="center">D</th>
              <th class="center">GP</th>
              <th class="center">GC</th>
              <th class="center">SG</th>
            </tr>
          </thead>
          <tbody id="standingsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- FASES ELIMINATÓRIAS -->
  <div class="card" id="bracketCard" style="display:none">
    <div class="card-header">
      <span class="icon">🏅</span>
      <h2>Fase Eliminatória</h2>
    </div>
    <div class="card-body">
      <div class="bracket-grid" id="bracketGrid"></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
// ─── DATA ──────────────────────────────────────────
const COUNTRIES = [
  { name: 'Alemanha',         flag: '🇩🇪' },
  { name: 'Argentina',        flag: '🇦🇷' },
  { name: 'Austrália',        flag: '🇦🇺' },
  { name: 'Áustria',          flag: '🇦🇹' },
  { name: 'Bósnia',           flag: '🇧🇦' },
  { name: 'Brasil',           flag: '🇧🇷' },
  { name: 'Canadá',           flag: '🇨🇦' },
  { name: 'Catar',            flag: '🇶🇦' },
  { name: 'Chile',            flag: '🇨🇱' },
  { name: 'China',            flag: '🇨🇳' },
  { name: 'Colômbia',         flag: '🇨🇴' },
  { name: 'Croácia',          flag: '🇭🇷' },
  { name: 'Equador',          flag: '🇪🇨' },
  { name: 'Escócia',          flag: '🏴󠁧󠁢󠁳󠁣󠁴󠁿' },
  { name: 'Espanha',          flag: '🇪🇸' },
  { name: 'Estados Unidos',   flag: '🇺🇸' },
  { name: 'França',           flag: '🇫🇷' },
  { name: 'Holanda',          flag: '🇳🇱' },
  { name: 'Inglaterra',       flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
  { name: 'Itália',           flag: '🇮🇹' },
  { name: 'Japão',            flag: '🇯🇵' },
  { name: 'Marrocos',         flag: '🇲🇦' },
  { name: 'México',           flag: '🇲🇽' },
  { name: 'Noruega',          flag: '🇳🇴' },
  { name: 'Paraguai',         flag: '🇵🇾' },
  { name: 'Portugal',         flag: '🇵🇹' },
  { name: 'República Tcheca', flag: '🇨🇿' },
  { name: 'Uruguai',          flag: '🇺🇾' },
];

let matches = [];   // { id, teamA, teamB, scoreA, scoreB }
let nextId  = 1;

// ─── INIT ───────────────────────────────────────────
function init() {
  const selA = document.getElementById('selA');
  const selB = document.getElementById('selB');
  COUNTRIES.forEach(c => {
    selA.innerHTML += `<option value="${c.name}">${c.flag} ${c.name}</option>`;
    selB.innerHTML += `<option value="${c.name}">${c.flag} ${c.name}</option>`;
  });
  selB.selectedIndex = 1;
  selA.addEventListener('change', syncSelects);
  selB.addEventListener('change', syncSelects);
}

function syncSelects() {
  /* just visual hint — validation on add */
}

function getFlag(name) {
  return COUNTRIES.find(c => c.name === name)?.flag || '';
}

// ─── ADD MATCH ──────────────────────────────────────
function addMatch() {
  const teamA = document.getElementById('selA').value;
  const teamB = document.getElementById('selB').value;
  if (teamA === teamB) {
    showToast('⚠️ Escolha países diferentes!');
    return;
  }
  const dup = matches.find(m =>
    (m.teamA === teamA && m.teamB === teamB) ||
    (m.teamA === teamB && m.teamB === teamA)
  );
  if (dup) {
    showToast('⚠️ Essa partida já foi adicionada.');
    return;
  }
  matches.push({ id: nextId++, teamA, teamB, scoreA: '', scoreB: '' });
  renderMatches();
  showToast(`✅ ${getFlag(teamA)} ${teamA} × ${teamB} ${getFlag(teamB)} adicionado!`);
}

// ─── RENDER MATCHES ─────────────────────────────────
function renderMatches() {
  const tbody = document.getElementById('matchBody');
  if (matches.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><span class="empty-icon">⚽</span>Nenhuma partida adicionada ainda.</div></td></tr>`;
    return;
  }
  tbody.innerHTML = matches.map((m, i) => {
    const sA = m.scoreA !== '' ? parseInt(m.scoreA) : null;
    const sB = m.scoreB !== '' ? parseInt(m.scoreB) : null;
    let pill = '';
    if (sA !== null && sB !== null && !isNaN(sA) && !isNaN(sB)) {
      if (sA > sB)      pill = `<span class="result-pill pill-win">Vitória A</span>`;
      else if (sA < sB) pill = `<span class="result-pill pill-loss">Vitória B</span>`;
      else               pill = `<span class="result-pill pill-draw">Empate</span>`;
    }
    return `
      <tr>
        <td style="color:var(--gray-400);font-size:.8rem">${i+1}</td>
        <td><span class="country-name"><span class="flag">${getFlag(m.teamA)}</span>${m.teamA}</span></td>
        <td class="center">
          <input type="number" min="0" max="99" class="score-input" value="${m.scoreA}"
            oninput="updateScore(${m.id},'A',this.value)" placeholder="—">
        </td>
        <td class="center" style="color:var(--gray-400);font-weight:700">×</td>
        <td class="center">
          <input type="number" min="0" max="99" class="score-input" value="${m.scoreB}"
            oninput="updateScore(${m.id},'B',this.value)" placeholder="—">
        </td>
        <td><span class="country-name"><span class="flag">${getFlag(m.teamB)}</span>${m.teamB}</span></td>
        <td class="center">${pill}</td>
        <td class="center"><button class="btn btn-danger" onclick="removeMatch(${m.id})">✕</button></td>
      </tr>`;
  }).join('');
}

function updateScore(id, side, val) {
  const m = matches.find(m => m.id === id);
  if (!m) return;
  if (side === 'A') m.scoreA = val;
  else              m.scoreB = val;
  // re-render only the pill cell
  renderMatches();
}

function removeMatch(id) {
  matches = matches.filter(m => m.id !== id);
  renderMatches();
}

// ─── CALC STANDINGS ────────────────────────────────
function calcStandings() {
  const validMatches = matches.filter(m => m.scoreA !== '' && m.scoreB !== '' &&
    !isNaN(parseInt(m.scoreA)) && !isNaN(parseInt(m.scoreB)));

  if (validMatches.length === 0) {
    showToast('⚠️ Insira placares em pelo menos uma partida.');
    return;
  }

  // Build stats map for all countries that appear in at least one scored match
  const stats = {};
  const seen = new Set();
  validMatches.forEach(m => { seen.add(m.teamA); seen.add(m.teamB); });
  seen.forEach(name => {
    stats[name] = { name, pts:0, wins:0, draws:0, losses:0, gf:0, ga:0 };
  });

  validMatches.forEach(m => {
    const sA = parseInt(m.scoreA), sB = parseInt(m.scoreB);
    stats[m.teamA].gf += sA; stats[m.teamA].ga += sB;
    stats[m.teamB].gf += sB; stats[m.teamB].ga += sA;
    if (sA > sB) {
      stats[m.teamA].pts += 3; stats[m.teamA].wins++;
      stats[m.teamB].losses++;
    } else if (sA < sB) {
      stats[m.teamB].pts += 3; stats[m.teamB].wins++;
      stats[m.teamA].losses++;
    } else {
      stats[m.teamA].pts += 1; stats[m.teamA].draws++;
      stats[m.teamB].pts += 1; stats[m.teamB].draws++;
    }
  });

  const table = Object.values(stats).sort((a, b) =>
    b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga) || b.gf - a.gf
  );

  renderStandings(table);
  renderBracket(table);
  document.getElementById('standingsCard').style.display = '';
  document.getElementById('standingsCard').scrollIntoView({ behavior:'smooth', block:'start' });
}

function renderStandings(table) {
  const tbody = document.getElementById('standingsBody');
  tbody.innerHTML = table.map((t, i) => {
    const pos = i + 1;
    const isTop = pos <= 4;
    const sg = t.gf - t.ga;
    return `
      <tr>
        <td><span class="standings-pos ${isTop?'top4':''}">${pos}</span>${isTop ? '<span class="semibadge">SEMI</span>' : ''}</td>
        <td><span class="country-name"><span class="flag">${getFlag(t.name)}</span>${t.name}</span></td>
        <td class="center pts-cell">${t.pts}</td>
        <td class="center">${t.wins}</td>
        <td class="center">${t.draws}</td>
        <td class="center">${t.losses}</td>
        <td class="center">${t.gf}</td>
        <td class="center">${t.ga}</td>
        <td class="center" style="color:${sg>=0?'#7eff9b':'#ff8080'}">${sg>0?'+':''}${sg}</td>
      </tr>`;
  }).join('');
}

// ─── BRACKET ────────────────────────────────────────
function renderBracket(table) {
  if (table.length < 4) {
    document.getElementById('bracketCard').style.display = 'none';
    return;
  }

  // 1st vs 4th, 2nd vs 3rd
  const sf1 = { a: table[0], b: table[3] };
  const sf2 = { a: table[1], b: table[2] };

  // Determine winners from actual match results or simulate with toss
  const sf1Result = getSemiFinalResult(sf1.a.name, sf1.b.name);
  const sf2Result = getSemiFinalResult(sf2.a.name, sf2.b.name);

  const finalResult = getFinalResult(sf1Result.winner, sf2Result.winner);

  const grid = document.getElementById('bracketGrid');
  grid.innerHTML = `
    <!-- Left semifinal -->
    <div class="semifinal-col">
      ${buildMatchCard('Semifinal 1', sf1.a, sf1.b, sf1Result)}
    </div>

    <!-- Center arrows -->
    <div class="bracket-arrow">
      <div class="arrow-line"></div>
      <span>→</span>
      <div class="arrow-line"></div>
    </div>

    <!-- Final + Champion on right -->
    <div class="final-col">
      ${buildMatchCard('Final', { name: sf1Result.winner }, { name: sf2Result.winner }, finalResult)}
      <div style="height:12px"></div>
      ${finalResult.winner ? `
        <div class="champion-card">
          <span class="champion-trophy">🏆</span>
          <div class="champion-label">Campeão</div>
          <div class="champion-name">${finalResult.winner}</div>
          <span class="champion-flag">${getFlag(finalResult.winner)}</span>
        </div>` : `<div class="pending-text">Aguardando resultados…</div>`}
    </div>

    <!-- Right semifinal (offset row) -->
    <div class="semifinal-col" style="grid-column:1;grid-row:2;margin-top:16px">
      ${buildMatchCard('Semifinal 2', sf2.a, sf2.b, sf2Result)}
    </div>
  `;

  // Re-lay out as 3-column single row with left having 2 semis
  grid.style.gridTemplateColumns = '1fr 60px 1fr';
  grid.style.gridTemplateRows = '1fr auto';
  grid.style.alignItems = 'center';

  document.getElementById('bracketCard').style.display = '';
  setTimeout(() => {
    document.getElementById('bracketCard').scrollIntoView({ behavior:'smooth', block:'start' });
  }, 120);
}

function buildMatchCard(label, teamA, teamB, result) {
  const safeA = teamA.name || '?';
  const safeB = teamB.name || '?';
  const winA  = result.winner === safeA;
  const winB  = result.winner === safeB;
  const sA    = result.scoreA !== undefined ? result.scoreA : '?';
  const sB    = result.scoreB !== undefined ? result.scoreB : '?';
  return `
    <div class="bracket-match">
      <div class="bracket-match-title">${label}</div>
      <div class="bracket-team ${winA?'winner':''}">
        <span>${getFlag(safeA)} ${safeA}</span>
        <span class="score-badge">${sA}</span>
      </div>
      <div class="bracket-team ${winB?'winner':''}">
        <span>${getFlag(safeB)} ${safeB}</span>
        <span class="score-badge">${sB}</span>
      </div>
    </div>`;
}

function getSemiFinalResult(nameA, nameB) {
  // Try to find a direct match between the two
  const m = matches.find(m =>
    (m.teamA === nameA && m.teamB === nameB) ||
    (m.teamA === nameB && m.teamB === nameA)
  );
  if (m && m.scoreA !== '' && m.scoreB !== '' && !isNaN(parseInt(m.scoreA)) && !isNaN(parseInt(m.scoreB))) {
    let sA = parseInt(m.scoreA), sB = parseInt(m.scoreB);
    if (m.teamA === nameB) { [sA, sB] = [sB, sA]; }  // normalise
    if (sA !== sB) {
      return { winner: sA > sB ? nameA : nameB, scoreA: sA, scoreB: sB };
    }
    // Draw → use standings as tiebreak (nameA already ranked higher)
    return { winner: nameA, scoreA: sA, scoreB: sB, note: 'nac desempate' };
  }
  // No direct match: use ranking (nameA ranked higher in this call)
  return { winner: nameA, scoreA: '—', scoreB: '—' };
}

function getFinalResult(winnerSF1, winnerSF2) {
  if (!winnerSF1 || !winnerSF2) return {};
  return getSemiFinalResult(winnerSF1, winnerSF2);
}

// ─── TOAST ──────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── START ──────────────────────────────────────────
init();
</script>
</body>
</html>
